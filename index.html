<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>easy studio asset</title>
  <meta name="description" content="we focus on creating useful and quality assets">
  <style>
    :root {
      --bg: #f5f5f5;
      --fg: #111;
      --muted: #6b6b6b;
      --line: #d4d4d4;
    }
    * {
      box-sizing: border-box;
    }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      font-size: 16px;
      line-height: 1.5;
      color: var(--fg);
      background: var(--bg);
      -webkit-font-smoothing: antialiased;
    }
    main {
      max-width: 720px;
      margin: 0 auto;
      padding: 3rem 1.5rem 4rem;
    }
    .hero {
      width: 100%;
      border-radius: 2px;
      overflow: hidden;
      box-shadow: 0 1px 0 var(--line);
    }
    .hero img {
      display: block;
      width: 100%;
      height: auto;
      vertical-align: middle;
    }
    h1 {
      margin: 2rem 0 0.5rem;
      font-size: 1.25rem;
      font-weight: 600;
      letter-spacing: 0.02em;
      text-transform: lowercase;
    }
    .tagline {
      margin: 0 0 2.5rem;
      color: var(--muted);
      font-size: 0.95rem;
      font-weight: 400;
    }
    .contact {
      padding-top: 1.5rem;
      border-top: 1px solid var(--line);
      font-size: 0.9rem;
      color: var(--muted);
    }
    .contact a {
      color: var(--fg);
      text-decoration: none;
      border-bottom: 1px solid var(--line);
    }
    .contact a:hover {
      border-bottom-color: var(--fg);
    }
  </style>
</head>
<body>
  <main>
    <figure class="hero">
      <img src="assets/banner.png" alt="easy studio asset banner">
    </figure>
    <h1>easy studio asset</h1>
    <p class="tagline">we focus on creating useful and quality assets</p>
    <p class="contact">
      Contact:
      <a href="mailto:easystudiowww@gmail.com">easystudiowww@gmail.com</a>
    </p>
  </main>
</body>
</html>
